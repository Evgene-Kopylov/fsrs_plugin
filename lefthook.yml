pre-commit:
    parallel: true
    jobs:
        - name: eslint
          glob: "*.{ts,mts}"
          run: npx eslint {staged_files}

        - name: stylelint
          glob: "*.css"
          run: npx stylelint {staged_files}

        - name: cargo fmt
          glob: "*.rs"
          run: cargo fmt --check
          root: "wasm-lib/"

pre-push:
    parallel: false
    jobs:
        - name: check
          run: sh scripts/check.sh
