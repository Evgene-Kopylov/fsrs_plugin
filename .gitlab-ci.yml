stages:
    - build-wasm
    - encode-wasm
    - test
    - lint
    - build
    - release

variables:
    NODE_VERSION: "24-alpine"
    RUST_VERSION: "latest"
    NPM_CONFIG_CACHE: "${CI_PROJECT_DIR}/.npm"

cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
        - node_modules/
        - .npm/
    policy: pull-push

.rules: &rules
    rules:
        - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"

build_wasm:
    stage: build-wasm
    <<: *rules
    image: rust:latest
    before_script:
        - cargo --version
        - rustc --version
    script:
        - cd wasm-lib
        - rustup component add rustfmt
        - cargo fmt -- --check
        - rustup component add clippy
        - cargo clippy -- -D warnings
        - cargo test
        - cd ..
        - curl -fsSL https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar -xz -C /usr/local/bin --strip-components=1
        - wasm-pack build wasm-lib --target web --out-dir pkg --out-name wasm_lib
    artifacts:
        paths:
            - wasm-lib/pkg/
        expire_in: 1 hour
    timeout: 10m

encode_wasm:
    stage: encode-wasm
    <<: *rules
    image: node:${NODE_VERSION}
    needs:
        - build_wasm
    before_script:
        - node --version
        - npm --version
    script:
        - npm ci --prefer-offline
        - npm run encode-wasm
    artifacts:
        paths:
            - wasm-lib/pkg/
        expire_in: 1 hour
    cache:
        key: "${CI_COMMIT_REF_SLUG}"
        paths:
            - node_modules/
            - .npm/
        policy: pull-push
    timeout: 10m

unit-tests:
    stage: test
    <<: *rules
    image: node:${NODE_VERSION}
    needs:
        - encode_wasm
    before_script:
        - node --version
        - npm --version
    script:
        - npm ci --prefer-offline
        - npm test
    cache:
        key: "${CI_COMMIT_REF_SLUG}"
        paths:
            - node_modules/
            - .npm/
        policy: pull-push
    timeout: 10m

typescript-check:
    stage: lint
    image: node:${NODE_VERSION}
    needs:
        - encode_wasm
    script:
        - npm ci --prefer-offline
        - npx tsc --noEmit --skipLibCheck
    <<: *rules
    cache:
        key: "${CI_COMMIT_REF_SLUG}"
        paths:
            - node_modules/
            - .npm/
        policy: pull-push
    timeout: 10m

eslint-check:
    stage: lint
    image: node:${NODE_VERSION}
    needs:
        - encode_wasm
    script:
        - npm ci --prefer-offline
        - npm run lint
    <<: *rules
    cache:
        key: "${CI_COMMIT_REF_SLUG}"
        paths:
            - node_modules/
            - .npm/
        policy: pull-push
    timeout: 10m

plugin-build:
    stage: build
    image: node:${NODE_VERSION}
    <<: *rules
    needs:
        - encode_wasm
        - unit-tests
        - typescript-check
        - eslint-check
    script:
        - npm ci --prefer-offline
        - npm run build:skip-wasm
    artifacts:
        paths:
            - main.js
            - styles.css
            - manifest.json
        expire_in: 1 hour
    cache:
        key: "${CI_COMMIT_REF_SLUG}"
        paths:
            - node_modules/
            - .npm/
        policy: pull-push
    timeout: 10m

push_to_github:
    stage: release
    image: alpine:latest
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    variables:
        GIT_STRATEGY: clone
        GIT_DEPTH: 0
        REPO_OWNER: "Evgene-Kopylov"
        REPO_NAME: "fsrs_plugin"
    before_script:
        - apk update
        - apk add --no-cache git curl jq zip
    script:
        - git remote add github "https://oauth2:${GITHUB_TOKEN}@github.com/${REPO_OWNER}/${REPO_NAME}"
        - git push github HEAD:refs/heads/main --force
    timeout: 10m

release_to_github:
    stage: release
    image: alpine:latest
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
    variables:
        GITHUB_OWNER: "Evgene-Kopylov"
        GITHUB_REPO: "fsrs_plugin"
        GIT_DEPTH: 0 # Чтобы git fetch --tags видел все теги
    needs:
        - plugin-build
    before_script:
        - apk update
        - apk add --no-cache git curl jq file bash
    script: |
        git fetch --tags
        LATEST_TAG=$(git tag --sort=-v:refname | head -n1)
        echo "Последний тег: $LATEST_TAG"
        export VERSION="$LATEST_TAG"
        chmod +x scripts/release-to-github.sh
        ./scripts/release-to-github.sh
    timeout: 10m
